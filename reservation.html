<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation - CAFE & REFRESH</title>
    <link rel="stylesheet" href="/src/scss/main.scss">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="preloader"><div class="loader"></div></div>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">CAFE & REFRESH</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="reservation.html" class="active">Reservation</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="nav-actions">
                <a href="cart.html" class="cart-icon">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-20">
        <div class="container max-w-2xl">
            <div class="section-title">
                <h2>Book a Table</h2>
                <p>Secure your spot and enjoy a premium dining experience.</p>
            </div>

            <div class="card p-8">
                <form action="php/reservation.php" method="POST">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" name="name" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" name="email" placeholder="Your Email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" name="phone" placeholder="Your Phone" required>
                        </div>
                        <div class="form-group">
                            <label>Number of Guests</label>
                            <select name="guests" required>
                                <option value="1">1 Person</option>
                                <option value="2">2 Persons</option>
                                <option value="3">3 Persons</option>
                                <option value="4">4 Persons</option>
                                <option value="5+">5+ Persons</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" name="date" required>
                        </div>
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" name="time" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Special Requests</label>
                        <textarea name="message" rows="4" placeholder="Any special requests?"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Confirm Reservation</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 CAFE & REFRESH. Made with ❤️ by Snehalatha</p>
        </div>
    </footer>

    <script src="/src/js/auth.js"></script>
    <script src="/src/js/cart.js"></script>
    <script src="/src/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
