<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - CAFE & REFRESH</title>
    <link rel="stylesheet" href="/src/scss/main.scss">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="preloader"><div class="loader"></div></div>
    <div id="toast-container"></div>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">CAFE & REFRESH</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="reservation.html">Reservation</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="nav-actions">
                <a href="cart.html" class="cart-icon">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-20">
        <div class="container">
            <div class="section-title">
                <h2>Your Shopping Cart</h2>
                <p>Review your items and proceed to checkout.</p>
            </div>

            <div class="cart-container">
                <div class="cart-items" id="cart-items-list">
                    <!-- Cart items injected here -->
                </div>

                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="cart-subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Fee</span>
                        <span>₹0 (Free)</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="cart-total">₹0</span>
                    </div>
                    <button class="btn-submit mt-6" onclick="alert('Order placed successfully! (Demo)')">Proceed to Checkout</button>
                    <a href="menu.html" class="block text-center mt-4 text-sm text-primary">Continue Shopping</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 CAFE & REFRESH. Made with ❤️ by Snehalatha</p>
        </div>
    </footer>

    <script src="/src/js/auth.js"></script>
    <script src="/src/js/cart.js"></script>
    <script src="/src/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', renderCart);
        lucide.createIcons();
    </script>
</body>
</html>
