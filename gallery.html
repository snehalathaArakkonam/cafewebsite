<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - CAFE & REFRESH</title>
    <link rel="stylesheet" href="/src/scss/main.scss">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="preloader"><div class="loader"></div></div>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">CAFE & REFRESH</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="gallery.html" class="active">Gallery</a></li>
                    <li><a href="reservation.html">Reservation</a></li>
                    <li><a href="contact.html">Contact</a></li>

            </nav>
            <div class="nav-actions">
                <a href="cart.html" class="cart-icon">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="pt-24">
        <!-- Hero Slider (Simplified with CSS animation) -->
        <section class="relative h-[60vh] overflow-hidden">
            <div class="absolute inset-0 flex transition-transform duration-1000" id="hero-slider">
                <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=1920" class="w-full h-full object-cover flex-shrink-0">
                <img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?auto=format&fit=crop&q=80&w=1920" class="w-full h-full object-cover flex-shrink-0">
                <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=1920" class="w-full h-full object-cover flex-shrink-0">
                <img src="https://images.unsplash.com/photo-1442512595331-e89e73853f31?auto=format&fit=crop&q=80&w=1920" class="w-full h-full object-cover flex-shrink-0">
            </div>
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                <h2 class="text-5xl text-white font-heading">Our Ambiance</h2>
            </div>
        </section>

        <section class="container py-20">
            <div class="section-title">
                <h2>Visual Journey</h2>
                <p>A glimpse into our world of coffee and culinary art.</p>
            </div>

            <div class="gallery-grid">
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1442512595331-e89e73853f31?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1559925393-8be0ec41b50d?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1498804103079-a6351b050096?auto=format&fit=crop&q=80&w=600"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1507133750040-4a8f57021571?auto=format&fit=crop&q=80&w=600"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 CAFE & REFRESH. Made with ❤️ by Snehalatha</p>
        </div>
    </footer>

    <script src="/src/js/auth.js"></script>
    <script src="/src/js/cart.js"></script>
    <script src="/src/js/main.js"></script>
    <script>
        // Simple Slider Logic
        let currentSlide = 0;
        const slider = document.getElementById('hero-slider');
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 4;
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        }, 5000);
        lucide.createIcons();
    </script>
</body>
</html>
